[Ollama]
; Absolute path to a pre-staged OllamaSetup.exe on the target machine.
; If this file exists, the installer will use it directly and skip downloading.
LocalSetupPath=C:\\Preinstall\\OllamaSetup.exe

; Fallback URL used when the local setup file above is missing.
DownloadUrl=https://ollama.com/download/OllamaSetup.exe

; Optional custom install directory for Ollama.
; Leave empty to let Ollama use its own default (%LOCALAPPDATA%\Programs\Ollama).
InstallDir=
