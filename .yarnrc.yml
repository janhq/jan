nmHoistingLimits: workspaces
nodeLinker: node-modules
checksumBehavior: update

# OpenUI's published peer range is still ^4.5.5, but Jan uses Zustand 5 and
# the OpenUI integration is tested against it. Widen the package metadata here
# until upstream publishes the same compatibility range.
packageExtensions:
  "@openuidev/react-headless@*":
    peerDependencies:
      zustand: "^4.5.5 || ^5.0.0"
  "@openuidev/react-ui@*":
    peerDependencies:
      zustand: "^4.5.5 || ^5.0.0"
